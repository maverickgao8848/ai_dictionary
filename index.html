<!DOCTYPE html>
<html lang='zh-CN'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AI 编程词汇卡片 | Vocabulary Cards</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}:root {
    /* Neobrutalist Palette */
    --bg-primary: #d9d9d9; /* light gray */
    --card-color: #ffde59; /* bold yellow */
    --card-color-dark: #ffb347; /* darker yellow/orange */
    --text-primary: #000000;
    --text-light: #000000;
    --accent-color: #ff007f; /* hot pink */
    --success-color: #39ff14; /* lime green */
    --primary-cyan: #0ff; /* cyan */
    --error-color: #ff3333;
    
    /* Neobrutalist structural tokens */
    --border-thickness: 3px;
    --border-color: #000000;
    --hard-shadow: 6px 6px 0px #000000;
    --hard-shadow-hover: 2px 2px 0px #000000;
    --shadow-color: #000;
}body {
    font-family: 'Noto Sans SC', 'VT323', monospace;
    background-color: var(--bg-primary);
    background-image: 
        linear-gradient(var(--border-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
    /* make the grid very faint */
    background-color: var(--bg-primary);
    background-image: 
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 30px;
    color: var(--text-primary);
}/* ===== HEADER ===== */
.header {
    text-align: center;
    margin-bottom: 25px;
    width: 100%;
    max-width: 1400px;
    background: #d9d9d9;
    border: var(--border-thickness) solid var(--border-color);
    box-shadow: var(--hard-shadow);
    padding: 20px;
    border-radius: 0;
}.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding: 0 10px;
    border-bottom: var(--border-thickness) solid var(--border-color);
    padding-bottom: 15px;
}.group-name {
    background: var(--card-color);
    padding: 8px 16px;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-primary);
    border: var(--border-thickness) solid var(--border-color);
    box-shadow: 3px 3px 0 #000;
}.nav-buttons {
    display: flex;
    align-items: center;
    gap: 15px;
}.nav-btn {
    background: #ffd1dc;
    border: var(--border-thickness) solid var(--border-color);
    color: var(--text-primary);
    padding: 8px 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    box-shadow: 3px 3px 0 #000;
    transition: all 0.1s;
}.nav-btn:hover:not(:disabled) {
    background: var(--primary-cyan);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
}.nav-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: 1px 1px 0 #000;
    transform: translate(2px, 2px);
}.page-indicator {
    font-weight: 900;
    font-size: 1rem;
    min-width: 50px;
    text-align: center;
    background: #f0f0f0;
    border: var(--border-thickness) solid var(--border-color);
    padding: 5px 10px;
}.header-center {
    text-align: center;
    margin: 15px 0;
}.header h1 {
    font-family: 'VT323', monospace;
    font-size: 2.5rem;
    color: var(--text-primary);
    background: var(--primary-cyan);
    display: inline-block;
    padding: 5px 20px;
    border: var(--border-thickness) solid var(--border-color);
    box-shadow: 4px 4px 0 #000;
    margin-bottom: 15px;
    text-transform: uppercase;
}.header .subtitle {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-primary);
    background: #ffd1dc;
    display: inline-block;
    padding: 5px 15px;
    border: 2px solid #000;
}.header-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
}.test-btn {
    background: var(--accent-color);
    color: #000;
    border: var(--border-thickness) solid var(--border-color);
    padding: 10px 25px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    box-shadow: var(--hard-shadow);
    transition: all 0.1s;
    text-shadow: 1px 1px 0 #000;
}.test-btn:hover {
    transform: translate(4px, 4px);
    box-shadow: var(--hard-shadow-hover);
}.wrong-btn {
    background: #f0f0f0;
    color: var(--text-primary);
    border: var(--border-thickness) solid var(--border-color);
    padding: 10px 20px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    box-shadow: var(--hard-shadow);
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
}.wrong-btn:hover:not(:disabled) {
    background: #e0e0e0;
    transform: translate(4px, 4px);
    box-shadow: var(--hard-shadow-hover);
}.wrong-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: 2px 2px 0 #000;
    transform: translate(4px, 4px);
}.wrong-count {
    background: var(--error-color);
    color: #000;
    font-size: 0.85rem;
    padding: 2px 8px;
    border: 2px solid #000;
    font-weight: 900;
    min-width: 24px;
    text-align: center;
}.wrong-count:empty, .wrong-count[data-count="0"] {
    display: none;
}/* ===== CARD GRID ===== */
.card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 1400px;
    flex: 1;
}.card-container {
    perspective: 1000px;
    height: calc((100vh - 280px) / 3);
    min-height: 180px;
    max-height: 240px;
    cursor: pointer;
    position: relative;
}.card-container.learned .card-face {
    background: #ccc !important;
}.card-container.learned .learned-badge {
    background: var(--success-color);
    color: #000;
    border: 2px solid #000;
    box-shadow: 2px 2px 0 #000;
}.learned-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: var(--success-color);
    color: #000;
    font-size: 0.8rem;
    padding: 5px 10px;
    border: 2px solid #000;
    z-index: 10;
    font-weight: 900;
    box-shadow: 2px 2px 0 #000;
    transform: rotate(5deg);
}.card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}.card.flipped {
    transform: rotateY(180deg);
}.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    padding: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: var(--border-thickness) solid var(--border-color);
    box-shadow: var(--hard-shadow);
    background: #fff0d4;
    transition: all 0.1s;
}/* Card Front */
.card-front {
    background: var(--card-color);
    justify-content: center;
    align-items: center;
    text-align: center;
}.card-front .vocab-en {
    font-family: 'VT323', monospace;
    font-size: 2.5rem;
    color: var(--text-primary);
    font-weight: 700;
    margin-bottom: 10px;
    background: #ffd1dc;
    padding: 5px 15px;
    border: 2px solid #000;
    box-shadow: 3px 3px 0 #000;
}.card-front .vocab-cn {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    background: #f0f0f0;
    padding: 3px 10px;
    border: 2px solid #000;
}.card-front .card-number {
    position: absolute;
    top: 5px;
    left: 5px;
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    color: #000;
    background: #000;
    padding: 2px 8px;
    font-weight: 900;
}/* Card Back */
.card-back {
    background: var(--success-color);
    transform: rotateY(180deg);
    justify-content: flex-start;
    padding: 15px;
}.card-back .back-title {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    color: #000;
    background: #000;
    padding: 5px 10px;
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
}.card-back .content-text {
    color: var(--text-primary);
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1.5;
    flex: 1;
    overflow: hidden;
    background: #fff0d4;
    padding: 8px;
    border: 2px solid #000;
}.card-images {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-shrink: 0;
}.card-images img {
    width: calc(50% - 5px);
    height: 50px;
    object-fit: cover;
    border: 2px solid #000;
    background: #e6e6e6;
}/* Hover effects */
.card-container:hover .card:not(.flipped) .card-front {
    background: var(--primary-cyan);
}.card-container:hover .card-face {
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 #000;
}.card-container:active .card-face {
    transform: translate(6px, 6px);
    box-shadow: 0px 0px 0 #000;
}/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(217, 217, 217, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s;
}.modal-overlay.active {
    opacity: 1;
    visibility: visible;
}.modal-content {
    background: #fff0d4;
    border: 4px solid #000;
    padding: 0;
    max-width: 700px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.2s;
    box-shadow: 12px 12px 0 #000;
}.modal-overlay.active .modal-content {
    transform: scale(1) translateY(0);
}.modal-header {
    background: var(--card-color);
    border-bottom: 4px solid #000;
    padding: 20px;
    position: relative;
}.modal-body {
    padding: 30px;
}.modal-close {
    position: absolute;
    top: 15px;
    right: 15px;
    background: #ffd1dc;
    border: 3px solid #000;
    font-size: 1.5rem;
    font-weight: 900;
    color: #000;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0 #000;
    transition: all 0.1s;
}.modal-close:hover {
    background: var(--error-color);
    color: #000;
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
}.modal-title {
    font-family: 'VT323', monospace;
    font-size: 3rem;
    color: #000;
    margin-bottom: 5px;
    text-transform: uppercase;
}.modal-subtitle {
    font-size: 1.2rem;
    font-weight: 900;
    color: #000;
    background: #ffd1dc;
    display: inline-block;
    padding: 5px 15px;
    border: 2px solid #000;
}.modal-explanation {
    color: var(--text-primary);
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 25px;
    padding: 20px;
    background: var(--bg-primary);
    border: 3px solid #000;
    box-shadow: 4px 4px 0 #000;
}.modal-images {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
    width: 100%;
}.modal-images img {
    flex: 1 1 0%;
    min-width: 0;
    max-height: 250px;
    height: auto;
    object-fit: contain;
    background: #e6e6e6;
    border: 3px solid #000;
    box-shadow: 6px 6px 0 #000;
    padding: 5px;
}.modal-images .image-placeholder {
    flex: 1;
    height: 200px;
    background: #eee;
    border: 3px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-weight: 900;
    font-size: 1.2rem;
    box-shadow: 6px 6px 0 #000;
}.modal-learn-btn {
    background: var(--success-color);
    color: #000;
    border: 3px solid #000;
    padding: 15px 40px;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.2rem;
    font-weight: 900;
    box-shadow: 6px 6px 0 #000;
    transition: all 0.1s;
    display: block;
    margin: 0 auto;
}.modal-learn-btn:hover {
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 #000;
}.modal-learn-btn:active {
    transform: translate(6px, 6px);
    box-shadow: 0 0 0 #000;
}.modal-learn-btn.learned {
    background: #ccc;
    color: #000;
}/* ===== TEST MODE ===== */
.test-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-primary);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}.test-overlay.hidden {
    display: none;
}.hidden {
    display: none !important;
}.test-content {
    background: #fff0d4;
    border: 4px solid #000;
    padding: 40px;
    max-width: 800px;
    width: 100%;
    box-shadow: 15px 15px 0 #000;
    position: relative;
}.test-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    border-bottom: 4px solid #000;
    padding-bottom: 20px;
}.test-progress {
    color: #000;
    font-size: 1.2rem;
    font-weight: 900;
    background: #ffd1dc;
    padding: 8px 20px;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 var(--primary-cyan);
}.test-close {
    background: #ffd1dc;
    border: 3px solid #000;
    color: #000;
    font-size: 1.5rem;
    font-weight: 900;
    cursor: pointer;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 4px 4px 0 #000;
    transition: all 0.1s ease;
}.test-close:hover {
    background: var(--error-color);
    color: #000;
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
}.test-vocab-card {
    background: var(--card-color);
    border: 4px solid #000;
    padding: 40px 50px;
    text-align: center;
    margin-bottom: 30px;
    box-shadow: 8px 8px 0 #000;
    position: relative;
}.test-vocab-en {
    font-family: 'VT323', monospace;
    font-size: 4rem;
    color: #000;
    margin-bottom: 10px;
    background: #ffd1dc;
    display: inline-block;
    padding: 10px 30px;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 #000;
    text-transform: uppercase;
}.test-vocab-cn {
    font-size: 1.5rem;
    font-weight: 900;
    color: #000;
    background: #f0f0f0;
    display: inline-block;
    padding: 5px 20px;
    border: 2px solid #000;
    margin-bottom: 20px;
}.test-learned-btn {
    margin-top: 15px;
    background: var(--success-color);
    color: #000;
    border: 3px solid #000;
    padding: 10px 25px;
    cursor: pointer;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 900;
    box-shadow: 4px 4px 0 #000;
    transition: all 0.1s ease;
    display: block;
    margin: 0 auto;
}.test-learned-btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #000;
}.test-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}.test-option {
    background: #f0f0f0;
    border: 3px solid #000;
    color: #000;
    padding: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.5;
    transition: all 0.1s ease;
    text-align: left;
    box-shadow: 6px 6px 0 #000;
}.test-option:hover {
    background: var(--primary-cyan);
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 #000;
}.test-option:active {
    transform: translate(6px, 6px);
    box-shadow: 0 0 0 #000;
}.test-option.correct {
    background: var(--success-color);
    color: #000;
}.test-option.wrong {
    background: var(--error-color);
    color: #000;
}/* Test Results */
.test-results {
    text-align: center;
    padding: 20px 0;
}.test-score-display {
    margin-bottom: 30px;
    background: var(--card-color);
    border: 4px solid #000;
    padding: 30px;
    box-shadow: 8px 8px 0 #000;
}.test-score-label {
    color: #000;
    font-size: 1.2rem;
    font-weight: 900;
    margin-bottom: 10px;
    background: #ffd1dc;
    display: inline-block;
    padding: 5px 15px;
    border: 2px solid #000;
}.test-score-value {
    font-family: 'VT323', monospace;
    font-size: 6rem;
    color: #000;
    text-shadow: 4px 4px 0 var(--success-color);
}.test-errors {
    background: #e6e6e6;
    border: 3px solid #000;
    padding: 20px;
    margin-bottom: 30px;
    text-align: left;
    box-shadow: 6px 6px 0 #000;
}.test-errors-title {
    color: #000;
    background: var(--error-color);
    display: inline-block;
    padding: 5px 15px;
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 15px;
    border: 2px solid #000;
}.error-list {
    list-style: none;
    padding: 0;
    margin: 0;
}.error-list li {
    color: #000;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 12px;
    border-bottom: 2px solid #000;
    background: #e0e0e0;
}.error-list li:last-child {
    border-bottom: none;
}.test-actions {
    display: flex;
    gap: 20px;
    justify-content: center;
}.test-restart-btn, .test-close-btn {
    padding: 15px 30px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.1s;
    border: 3px solid #000;
    box-shadow: 6px 6px 0 #000;
}.test-restart-btn {
    background: var(--accent-color);
    color: #000;
}.test-restart-btn:hover {
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 #000;
}.test-close-btn {
    background: #f0f0f0;
    color: #000;
}.test-close-btn:hover {
    background: #ccc;
    transform: translate(2px, 2px);
    box-shadow: 4px 4px 0 #000;
}@media (max-width: 768px) {
    .test-content {
        padding: 20px;
    }.test-options {
        grid-template-columns: 1fr;
    }.test-vocab-en {
        font-size: 2.5rem;
    }.card-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(6, 1fr);
    }
}/* ===== FOOTER ===== */
.footer {
    margin-top: 25px;
    text-align: center;
    font-family: 'VT323', monospace;
    color: #000;
    font-size: 1rem;
    font-weight: 900;
    background: #d9d9d9;
    padding: 10px 20px;
    border: 3px solid #000;
    box-shadow: 4px 4px 0 #000;
}

    </style>
</head>
<body>
    <header class='header'>
        <div class='header-top'>
            <div class='group-name' id='groupName'>第一组：开发环境与运行基础</div>
            <div class='nav-buttons'>
                <button class='nav-btn' id='prevBtn' onclick='changePage(-1)'>← 上一页</button>
                <span class='page-indicator' id='pageIndicator'>1/4</span>
                <button class='nav-btn' id='nextBtn' onclick='changePage(1)'>下一页 →</button>
            </div>
        </div>
        <div class='header-center'>
            <h1>&lt;AI 编程词汇卡片 /&gt;</h1>
            <p class='subtitle'>点击卡片翻转查看解释</p>
        </div>
        <div class='header-actions'>
            <button class='test-btn' onclick='startTest()'>🎯 开始测试</button>
            <button class='wrong-btn' onclick='startWrongTest()'>📝 错题本 <span class='wrong-count' id='wrongCount'>0</span></button>
        </div>
    </header>

    <main class='card-grid' id='cardGrid'>
        <!-- Cards will be rendered by JavaScript -->
    </main>

    <footer class='footer'>
        <div>Made with 💻 & ☕ | Programming Vocabulary Cards</div>
    </footer>

    <!-- Modal for enlarged card view -->
    <div class='modal-overlay' id='modalOverlay' onclick='closeModal(event)'>
        <div class='modal-content' onclick='event.stopPropagation()'>
            <button class='modal-close' onclick='closeModal()'>&times;</button>
            <h2 class='modal-title' id='modalTitle'>IDE</h2>
            <p class='modal-subtitle' id='modalSubtitle'>集成开发环境</p>
            <div class='modal-explanation' id='modalExplanation'>
                IDE就像一间工具齐全的工作室...
            </div>
            <div class='modal-images' id='modalImages'>
                <!-- Images will be inserted here -->
            </div>
            <button class='modal-learn-btn' id='modalLearnBtn' onclick='toggleLearnedFromModal()'>
                ✓ 标记为已学会
            </button>
        </div>
    </div>

    <!-- Test Mode Overlay -->
    <div class='test-overlay hidden' id='testOverlay' onclick='closeTest()'>
        <div class='test-content' onclick='event.stopPropagation()'>
            <div class='test-header'>
                <div class='test-progress' id='testProgress'>1 / 10</div>
                <button class='test-close' onclick='closeTest()'>×</button>
            </div>
            <div class='test-vocab-card'>
                <div class='test-vocab-en' id='testVocabEn'>IDE</div>
                <div class='test-vocab-cn' id='testVocabCn'>集成开发环境</div>

            { id: 31, group: 3, en: 'Debug', cn: '调试', imageKey: 'debug',

            { id: 32, group: 3, en: 'Workflow', cn: '工作流', imageKey: 'workflow',

            { id: 41, group: 3, en: 'Hallucination', cn: '幻觉', imageKey: 'hallucination',
              explanation: '幻觉像一个自信但记错细节的人。它是模型在没有真实依据时编造内容的现象。在vibe coding里，它提醒你必须验证AI生成的代码。' },
            { id: 42, group: 3, en: 'Agent', cn: '智能体', imageKey: 'agent',

            { id: 43, group: 3, en: 'Skill', cn: '技能', imageKey: 'skill',

            { id: 44, group: 3, en: 'Cloud', cn: '云端', imageKey: 'cloud',

        const groupNames = {
            1: '第一组：开发环境与运行基础',
            2: '第二组：代码协作与项目结构',
            3: '第三组：网页、数据流与AI工具',
            4: '第四组：AI技术相关'
        };

        // ===== STATE =====
        let currentPage = 1;
        let currentModalVocab = null;
        let testQueue = [];
        let testIndex = 0;
        let testErrors = [];
        let testCorrectCount = 0;
        let currentTestVocab = null;
        let isWrongTestMode = false; // 是否为错题本测试模式

        // ===== STORAGE =====
        const Storage = {
            getLearned() {
                const data = localStorage.getItem('learnedVocab');
                return data ? JSON.parse(data) : [];
            },
            toggleLearned(id) {
                const learned = this.getLearned();
                const index = learned.indexOf(id);
                if (index > -1) {
                    learned.splice(index, 1);
                } else {
                    learned.push(id);
                }
                localStorage.setItem('learnedVocab', JSON.stringify(learned));
                return learned.includes(id);
            },
            getPage() {
                return parseInt(localStorage.getItem('currentPage')) || 1;
            },
            setPage(page) {
                localStorage.setItem('currentPage', page);
            },
            // 错题本相关方法
            getWrongAnswers() {
                const data = localStorage.getItem('wrongAnswers');
                return data ? JSON.parse(data) : [];
            },
            addWrongAnswer(id) {
                const wrong = this.getWrongAnswers();
                if (!wrong.includes(id)) {
                    wrong.push(id);
                    localStorage.setItem('wrongAnswers', JSON.stringify(wrong));
                }
            },
            removeWrongAnswer(id) {
                const wrong = this.getWrongAnswers();
                const index = wrong.indexOf(id);
                if (index > -1) {
                    wrong.splice(index, 1);
                    localStorage.setItem('wrongAnswers', JSON.stringify(wrong));
                }
            },
            getWrongCount() {
                return this.getWrongAnswers().length;
            }
        };

        // ===== RENDERING =====
        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const startId = (currentPage - 1) * 11 + 1;
            const endId = startId + 10;
            const pageVocabs = vocabulary.filter(v => v.id >= startId && v.id <= endId);
            const learned = Storage.getLearned();

            grid.innerHTML = '';

            pageVocabs.forEach((vocab, index) => {
                const isLearned = learned.includes(vocab.id);
                const container = document.createElement('div');
                container.className = `card-container${isLearned ? ' learned' : ''}`;
                container.dataset.id = vocab.id;
                container.onclick = () => handleCardClick(vocab);

                container.innerHTML = `
                    ${isLearned ? '<div class="learned-badge">✓ 已学会</div>' : ''}
                    <div class="card">
                        <div class="card-face card-front">
                            <span class="card-number">${String(vocab.id).padStart(2, '0')}</span>
                            <div class="vocab-en">${vocab.en}</div>
                            <div class="vocab-cn">${vocab.cn}</div>
                        </div>
                        <div class="card-face card-back">
                            <div class="back-title">${vocab.en} / ${vocab.cn}</div>
                            <div class="content-text">${vocab.explanation}</div>
                            <div class="card-images">
                                <img src='images/${vocab.imageKey}_screenshot.png' onerror="this.style.display='none'">
                                <img src='images/${vocab.imageKey}_comic.png' onerror="this.style.display='none'">
                            </div>
                        </div>
                    </div>
                `;

                grid.appendChild(container);
            });

            // Fill remaining slots with empty cards
            for (let i = pageVocabs.length; i < 12; i++) {
                const emptyContainer = document.createElement('div');
                emptyContainer.className = 'card-container card-empty';
                emptyContainer.innerHTML = `
                    <div class="card">
                        <div class="card-face card-front">
                            <div class="placeholder-content">
                                <div class="placeholder-icon">?</div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(emptyContainer);
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('groupName').textContent = groupNames[currentPage];
            document.getElementById('pageIndicator').textContent = `${currentPage}/4`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === 4;
        }

        // ===== PAGINATION =====
        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= 4) {
                currentPage = newPage;
                Storage.setPage(currentPage);
                renderCards();
            }
        }

        // ===== CARD INTERACTION =====
        function handleCardClick(vocab) {
            const container = document.querySelector(`.card-container[data-id='${vocab.id}']`);
            const card = container.querySelector('.card');

            // Flip the card first
            card.classList.add('flipped');

            // Open modal after 200ms
            setTimeout(() => {
                openModal(vocab);
            }, 200);
        }

        // ===== MODAL =====
        function openModal(vocab) {
            currentModalVocab = vocab;
            const learned = Storage.getLearned();
            const isLearned = learned.includes(vocab.id);

            document.getElementById('modalTitle').textContent = vocab.en;
            document.getElementById('modalSubtitle').textContent = vocab.cn;
            document.getElementById('modalExplanation').textContent = vocab.explanation;

            const imagesContainer = document.getElementById('modalImages');
            imagesContainer.innerHTML = `
                <img src="images/${vocab.imageKey}_screenshot.png" onerror="this.style.display='none'">
                <img src="images/${vocab.imageKey}_comic.png" onerror="this.style.display='none'">
            `;

            const btn = document.getElementById('modalLearnBtn');
            btn.textContent = isLearned ? '✓ 已学会 (点击取消)' : '✓ 标记为已学会';
            btn.className = `modal-learn-btn${isLearned ? ' learned' : ''}`;

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('active');
            currentModalVocab = null;
        }

        function toggleLearnedFromModal() {
            if (!currentModalVocab) return;
            const isNowLearned = Storage.toggleLearned(currentModalVocab.id);
            renderCards();

            const btn = document.getElementById('modalLearnBtn');
            btn.textContent = isNowLearned ? '✓ 已学会 (点击取消)' : '✓ 标记为已学会';
            btn.className = `modal-learn-btn${isNowLearned ? ' learned' : ''}`;
        }

        // ===== TEST MODE =====
        // 提取解释的第二句话
        function getSecondSentence(explanation) {
            const sentences = explanation.split('。').filter(s => s.trim());
            return sentences.length >= 2 ? sentences[1].trim() + '。' : explanation;
        }

        function startTest() {
            isWrongTestMode = false;
            const learned = Storage.getLearned();
            testQueue = vocabulary.filter(v => !learned.includes(v.id));
            testErrors = [];
            testCorrectCount = 0;
            testIndex = 0;

            if (testQueue.length === 0) {
                alert('🎉 恭喜！你已经学会了所有词汇！');
                return;
            }

            // Shuffle test queue
            testQueue = testQueue.sort(() => Math.random() - 0.5);

            document.getElementById('testOverlay').classList.remove('hidden');
            document.getElementById('testResults').classList.add('hidden');
            showTestVocab();
        }

        // ===== 错题本测试 =====
        function startWrongTest() {
            const wrongIds = Storage.getWrongAnswers();

            if (wrongIds.length === 0) {
                alert('📝 错题本是空的，继续加油！');
                return;
            }

            isWrongTestMode = true;
            testQueue = vocabulary.filter(v => wrongIds.includes(v.id));
            testErrors = [];
            testCorrectCount = 0;
            testIndex = 0;

            // Shuffle test queue
            testQueue = testQueue.sort(() => Math.random() - 0.5);

            document.getElementById('testOverlay').classList.remove('hidden');
            document.getElementById('testResults').classList.add('hidden');
            showTestVocab();
        }

        function updateWrongCount() {
            const count = Storage.getWrongCount();
            const countEl = document.getElementById('wrongCount');
            countEl.textContent = count;
            countEl.dataset.count = count;

            // 更新按钮状态
            const wrongBtn = document.querySelector('.wrong-btn');
            if (wrongBtn) {
                wrongBtn.disabled = count === 0;
            }
        }

        function showTestVocab() {
            if (testIndex >= testQueue.length) {
                showTestResults();
                return;
            }

            currentTestVocab = testQueue[testIndex];
            document.getElementById('testVocabEn').textContent = currentTestVocab.en;
            document.getElementById('testVocabCn').textContent = currentTestVocab.cn;
            document.getElementById('testProgress').textContent = `${testIndex + 1} / ${testQueue.length}`;

            renderTestOptions();
        }

        function renderTestOptions() {
            const optionsContainer = document.getElementById('testOptions');
            optionsContainer.innerHTML = '';

            // Generate options: correct + 3 random wrong
            const wrongOptions = vocabulary
                .filter(v => v.id !== currentTestVocab.id)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);

            const options = [...wrongOptions, currentTestVocab].sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'test-option';
                btn.textContent = getSecondSentence(opt.explanation);
                btn.onclick = () => selectOption(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selected, btn) {
            const isCorrect = selected.id === currentTestVocab.id;

            if (isCorrect) {
                btn.classList.add('correct');
                testCorrectCount++;
                testIndex++;

                // 如果是错题本模式，答对了就从错题本移除
                if (isWrongTestMode) {
                    Storage.removeWrongAnswer(currentTestVocab.id);
                    updateWrongCount();
                }

                setTimeout(showTestVocab, 500);
            } else {
                btn.classList.add('wrong');
                testErrors.push({
                    vocab: currentTestVocab,
                    wrongAnswer: getSecondSentence(selected.explanation)
                });

                // 如果是普通测试模式，答错了就加入错题本
                if (!isWrongTestMode) {
                    Storage.addWrongAnswer(currentTestVocab.id);
                    updateWrongCount();
                }

                // Disable wrong option
                btn.disabled = true;
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function markTestVocabLearned() {
            Storage.toggleLearned(currentTestVocab.id);
            testQueue = testQueue.filter(v => v.id !== currentTestVocab.id);
            renderCards();

            if (testIndex >= testQueue.length) {
                showTestResults();
            } else {
                showTestVocab();
            }
        }

        function showTestResults() {
            const total = testCorrectCount + testErrors.length;
            const accuracy = total > 0 ? Math.round((testCorrectCount / total) * 100) : 0;

            document.getElementById('testScore').textContent = `${accuracy}%`;
            document.getElementById('testProgress').textContent = '测试完成';

            const errorList = document.getElementById('errorList');
            errorList.innerHTML = '';

            if (testErrors.length > 0) {
                document.getElementById('testErrors').classList.remove('hidden');
                testErrors.forEach(err => {
                    const li = document.createElement('li');
                    li.textContent = `${err.vocab.en} (${err.vocab.cn}) - 你选了: ${err.wrongAnswer}`;
                    errorList.appendChild(li);
                });
            } else {
                document.getElementById('testErrors').classList.add('hidden');
            }

            document.getElementById('testResults').classList.remove('hidden');
            document.getElementById('testVocabEn').parentElement.classList.add('hidden');
            document.getElementById('testOptions').classList.add('hidden');
        }

        function closeTest() {
            document.getElementById('testOverlay').classList.add('hidden');
            document.getElementById('testVocabEn').parentElement.classList.remove('hidden');
            document.getElementById('testOptions').classList.remove('hidden');
        }

        function restartTest() {
            document.getElementById('testVocabEn').parentElement.classList.remove('hidden');
            document.getElementById('testOptions').classList.remove('hidden');
            startTest();
        }

        // ===== KEYBOARD SUPPORT =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeTest();
            }
            if (e.key === 'ArrowLeft') changePage(-1);
            if (e.key === 'ArrowRight') changePage(1);
        });

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            currentPage = Storage.getPage();
            renderCards();
            updateWrongCount();
            console.log('%c🎴 词汇卡片已加载完成', 'color: #e8a598; font-size: 14px; font-weight: bold;');
        });
    </script>
</body>
</html>
